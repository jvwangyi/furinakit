version: '3.8'

services:
  furinakit:
    build: .
    environment:
      - NODE_ENV=production
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - DATABASE_URL=${DATABASE_URL:-file:./dev.db}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
    volumes:
      - furinakit-data:/app/data
      - furinakit-tmp:/tmp/furinakit
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      furinakit:
        condition: service_healthy
    restart: unless-stopped

  # Scheduled cleanup of temporary files (every hour)
  cleanup:
    image: alpine:latest
    volumes:
      - furinakit-tmp:/tmp/furinakit
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo '0 * * * * find /tmp/furinakit -type f -mmin +60 -delete' > /etc/crontabs/root
        echo 'Cleanup cron started, running every hour'
        crond -f -l 8
    restart: unless-stopped

volumes:
  furinakit-data:
  furinakit-tmp:
